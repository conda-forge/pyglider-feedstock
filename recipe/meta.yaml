{% set name = "pyglider" %}
{% set version = "0.0.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyglider-{{ version }}.tar.gz
  sha256: 3dda698945238ccad102abbc9d91a7c407013c825cb55d6abacdf09660a71b23

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.6
  run:
    - bitstring
    - dask-core
    - gsw
    - netcdf4
    - pooch
    - python >=3.6
    - scipy
    - xarray
    - polars

test:
  imports:
    - pyglider
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://pyglider.readthedocs.io
  summary: Glider data to netCDF translation in python
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/c-proof/pyglider

extra:
  recipe-maintainers:
    - jklymak
